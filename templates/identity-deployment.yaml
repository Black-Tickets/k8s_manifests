{{- if .Values.identity.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-service
  namespace: {{ .Values.global.namespace }}
  labels:
    app: identity-service
spec:
  replicas: {{ .Values.identity.replicaCount }}
  selector:
    matchLabels:
      app: identity-service
  template:
    metadata:
      labels:
        app: identity-service
    spec:
      containers:
      - name: identity-service
        image: "{{ .Values.identity.image.repository }}:{{ .Values.identity.image.tag }}"
        imagePullPolicy: {{ .Values.identity.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.identity.service.port }}
        envFrom:
        - configMapRef:
            name: {{ .Values.configmap.name }}
        - secretRef:
            name: {{ .Values.secrets.name }}
        livenessProbe:
          httpGet:
            path: /health
            port: {{ .Values.identity.service.port }}
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: {{ .Values.identity.service.port }}
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          {{- toYaml .Values.identity.resources | nindent 10 }}
---
apiVersion: v1
kind: Service
metadata:
  name: identity-service
  namespace: {{ .Values.global.namespace }}
spec:
  selector:
    app: identity-service
  ports:
  - port: {{ .Values.identity.service.port }}
    targetPort: {{ .Values.identity.service.port }}
  type: ClusterIP
{{- end }}
