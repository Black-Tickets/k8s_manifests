{{- if .Values.secrets.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secrets.name }}
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ .Values.secrets.postgresPassword | quote }}
  JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}
  ADMIN_EMAIL: {{ .Values.secrets.adminEmail | quote }}
  ADMIN_PASSWORD: {{ .Values.secrets.adminPassword | quote }}
  USER_EMAIL: {{ .Values.secrets.userEmail | quote }}
  USER_PASSWORD: {{ .Values.secrets.userPassword | quote }}
  DB_PASS: {{ .Values.secrets.postgresPassword | quote }}
{{- end }}
