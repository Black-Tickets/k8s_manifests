{{- if .Values.httproute.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ticketing-routes
  namespace: {{ .Values.global.namespace }}
spec:
  parentRefs:
    - name: {{ .Values.httproute.parentGateway }}

  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /auth
      backendRefs:
        - name: identity-service
          port: {{ .Values.identity.service.port }}

    - matches:
        - path:
            type: PathPrefix
            value: /events
      backendRefs:
        - name: event-service
          port: {{ .Values.event.service.port }}

    - matches:
        - path:
            type: PathPrefix
            value: /bookings
      backendRefs:
        - name: booking-service
          port: {{ .Values.booking.service.port }}

    - matches:
        - path:
            type: PathPrefix
            value: /chatbot
      backendRefs:
        - name: chatbot-service
          port: {{ .Values.chatbot.service.port }}

    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: frontend-service
          port: {{ .Values.frontend.service.port }}
{{- end }}
