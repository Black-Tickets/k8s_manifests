# Development environment values
global:
  namespace: ticketing-dev
  imagePullPolicy: IfNotPresent

# Frontend service
frontend:
  replicaCount: 1
  image:
    tag: v1.0.0

# Identity service
identity:
  replicaCount: 1
  image:
    tag: v1.0.0

# Event service
event:
  replicaCount: 1
  image:
    tag: v1.0.0

# Booking service
booking:
  replicaCount: 1
  image:
    tag: v1.0.0

# Chatbot service
chatbot:
  replicaCount: 1
  image:
    tag: v1.0.0
  nfs:
    enabled: true
    pvcName: nfs-pvc
    mountPath: /app/data
    size: 10Gi
    volumeName: nfs-pv-dev

# PostgreSQL
postgres:
  replicaCount: 1
  persistence:
    enabled: true
    storageClass: manual
    size: 10Gi
    volumeName: postgres-pv-dev
